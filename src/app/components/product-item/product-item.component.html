<div class="product-card card h-100 border-0 shadow-sm">
  <div class="product-img-wrapper">
    <img [src]="product.url" class="card-img-top product-img" alt="{{ product.name }}" />
  </div>

  <div class="card-body d-flex flex-column">
    <h5 class="card-title product-title">{{ product.name }}</h5>

    <div class="mt-auto">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <span class="price"> ${{ product.price.toFixed(2) }} </span>
      </div>

      <select class="form-select form-select-sm mb-2" [(ngModel)]="quantity">
        @for (item of productItems; track $index) {
          <option [value]="item">{{ item }}</option>
        }
      </select>

      <button class="btn btn-primary w-100" (click)="onAddToCart(product, quantity)">
        Add to Cart
      </button>
    </div>
  </div>
</div>
