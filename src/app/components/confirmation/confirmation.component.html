@if (orderSummary) {
  <div class="row mt-4 justify-content-center">
    <div class="col-md-12 col-lg-12">
      <div class="checkout-card p-4 p-md-5 text-center">
        <!-- Success icon -->
        <div class="empty-cart-icon mb-3">✅</div>

        <h2 class="h3 mb-2">Thank you, {{ orderSummary.fullName }}!</h2>
        <p class="text-muted mb-4">Your order has been placed successfully.</p>

        <!-- Order total-->
        <div class="order-summary py-3 px-4 mx-auto d-inline-block">
          <div class="d-flex gap-3 align-items-baseline">
            <span class="text-muted">Total paid</span>
            <strong class="text-primary fs-2">${{ orderSummary.totalPrice }}</strong>
          </div>
        </div>

        <!-- Continue button -->
        <div class="mt-4">
          <button class="btn btn-primary px-4" routerLink="/">Continue Shopping →</button>
        </div>
      </div>
    </div>
  </div>
} @else {
  <div class="row mt-4">
    <div class="col-12">
      <div class="empty-cart-card text-center py-5">
        <div class="empty-cart-icon mb-3">🛒</div>
        <h3 class="h5">No order found</h3>
        <p class="text-muted small mb-3">It seems you haven't placed an order yet.</p>
        <button class="btn btn-primary btn-sm" routerLink="/">Browse Products</button>
      </div>
    </div>
  </div>
}
