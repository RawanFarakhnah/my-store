      aria-expanded="false"
      aria-label="Toggle navigation"

      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-3">

          <a

            routerLinkActive="active"

          </a>
        </li>

        <li class="nav-item">
          <a
            class="nav-link cart-link"
            routerLink="/cart"
            routerLinkActive="active"

            </span>
          </a>
        </li>

      </ul>

      <!-- Search -->
      <form class="d-flex search-form ms-lg-4 mt-3 mt-lg-0" role="search">
